<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Nuevo cliente persona')}">
</head>

<body class="bg-slate-100 font-inter text-slate-800">

<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">

        <div class="mb-8">
            <a th:href="@{/clientes}"
               class="mb-4 inline-flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a clientes
            </a>

            <h1 class="text-3xl font-extrabold text-slate-900">
                Nuevo cliente persona
            </h1>

            <p class="mt-2 text-slate-500">
                Registra los datos personales del cliente.
            </p>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <form th:object="${persona}"
              th:action="@{/clientes/persona}"
              method="post"
              class="panel space-y-6">

            <input type="hidden"
                   th:field="*{estado}">

            <div class="grid gap-5 md:grid-cols-3">

                <div>
                    <label for="dni"
                           class="form-label">
                        <i class="fa-solid fa-id-card"></i>
                        DNI
                    </label>

                    <input id="dni"
                           type="text"
                           th:field="*{dni}"
                           class="form-input"
                           required
                           minlength="8"
                           maxlength="8"
                           pattern="[0-9]{8}"
                           inputmode="numeric"
                           autocomplete="off"
                           placeholder="80950049">
                </div>

                <div>
                    <label for="nombres"
                           class="form-label">
                        <i class="fa-solid fa-user"></i>
                        Nombres
                    </label>

                    <input id="nombres"
                           type="text"
                           th:field="*{nombres}"
                           class="form-input"
                           required
                           maxlength="80"
                           autocomplete="given-name"
                           placeholder="Franco">
                </div>

                <div>
                    <label for="apePaterno"
                           class="form-label">
                        <i class="fa-solid fa-user"></i>
                        Apellido paterno
                    </label>

                    <input id="apePaterno"
                           type="text"
                           th:field="*{apePaterno}"
                           class="form-input"
                           required
                           maxlength="70"
                           autocomplete="family-name"
                           placeholder="Franco">
                </div>

                <div>
                    <label for="apeMaterno"
                           class="form-label">
                        <i class="fa-solid fa-user"></i>
                        Apellido materno
                    </label>

                    <input id="apeMaterno"
                           type="text"
                           th:field="*{apeMaterno}"
                           class="form-input"
                           required
                           maxlength="70"
                           placeholder="Franco">
                </div>

                <div>
                    <label for="celular"
                           class="form-label">
                        <i class="fa-solid fa-phone"></i>
                        Celular
                    </label>

                    <input id="celular"
                           type="text"
                           th:field="*{celular}"
                           class="form-input"
                           required
                           minlength="9"
                           maxlength="9"
                           pattern="[0-9]{9}"
                           inputmode="numeric"
                           autocomplete="tel"
                           placeholder="929235488">
                </div>

                <div>
                    <label for="correo"
                           class="form-label">
                        <i class="fa-solid fa-envelope"></i>
                        Correo
                    </label>

                    <input id="correo"
                           type="email"
                           th:field="*{correo}"
                           class="form-input"
                           required
                           maxlength="80"
                           autocomplete="email"
                           placeholder="tresdynx@gmail.com">
                </div>

                <div>
                    <label for="fecNac"
                           class="form-label">
                        <i class="fa-solid fa-calendar-days"></i>
                        Fecha de nacimiento
                    </label>

                    <input id="fecNac"
                           type="date"
                           th:field="*{fecNac}"
                           class="form-input"
                           required
                           autocomplete="bday">
                </div>

                <div>
                    <label for="estCivil"
                           class="form-label">
                        <i class="fa-solid fa-heart"></i>
                        Estado civil
                    </label>

                    <select id="estCivil"
                            th:field="*{estCivil}"
                            class="form-input"
                            required>

                        <option value="">
                            Seleccione
                        </option>

                        <option value="SO">
                            Soltero(a)
                        </option>

                        <option value="CA">
                            Casado(a)
                        </option>

                        <option value="VI">
                            Viudo(a)
                        </option>

                        <option value="DI">
                            Divorciado(a)
                        </option>
                    </select>
                </div>

                <div>
                    <label for="idDistrito"
                           class="form-label">
                        <i class="fa-solid fa-map-location-dot"></i>
                        Distrito
                    </label>

                    <select id="idDistrito"
                            th:field="*{idDistrito}"
                            class="form-input"
                            required>

                        <option value="">
                            Seleccione distrito
                        </option>

                        <option th:each="distrito : ${distritos}"
                                th:value="${distrito.idDistrito}"
                                th:text="${distrito.nombreCompleto}">
                            Departamento / Provincia / Distrito
                        </option>
                    </select>
                </div>

            </div>

            <div>
                <label for="direccion"
                       class="form-label">
                    <i class="fa-solid fa-location-dot"></i>
                    Dirección
                </label>

                <input id="direccion"
                       type="text"
                       th:field="*{direccion}"
                       class="form-input"
                       required
                       maxlength="90"
                       autocomplete="street-address"
                       placeholder="Cerca">
            </div>

            <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-6 sm:flex-row sm:justify-end">

                <a th:href="@{/clientes}"
                   class="btn-light justify-center">
                    <i class="fa-solid fa-xmark"></i>
                    Cancelar
                </a>

                <button type="submit"
                        class="btn-primary justify-center">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Guardar cliente
                </button>

            </div>

        </form>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>

</body>
</html>
