<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Nuevo cliente empresa')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-4xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a th:href="@{/clientes}" class="mb-4 inline-flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a clientes
            </a>
            <h1 class="text-3xl font-extrabold text-slate-900">Nuevo cliente empresa</h1>
            <p class="mt-2 text-slate-500">Registra los datos principales de la empresa.</p>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <form th:object="${empresa}" th:action="@{/clientes/empresa}" method="post" class="panel space-y-6">
            <input type="hidden" name="estado" value="1">

            <div class="grid gap-5 md:grid-cols-2">
                <div>
                    <label class="form-label"><i class="fa-solid fa-id-card"></i>RUC</label>
                    <input type="text" th:field="*{ruc}" class="form-input" maxlength="11" required placeholder="20123456789">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-phone"></i>Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-input" maxlength="10" placeholder="Teléfono">
                </div>

                <div class="md:col-span-2">
                    <label class="form-label"><i class="fa-solid fa-building"></i>Razón social</label>
                    <input type="text" th:field="*{razonSocial}" class="form-input" maxlength="90" required placeholder="Razón social">
                </div>

                <div class="md:col-span-2">
                    <label class="form-label"><i class="fa-solid fa-location-dot"></i>Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-input" maxlength="90" placeholder="Dirección fiscal">
                </div>
            </div>

            <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-6 sm:flex-row sm:justify-end">
                <a th:href="@{/clientes}" class="btn-light justify-center">
                    <i class="fa-solid fa-xmark"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn-primary justify-center">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Guardar empresa
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
