<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | CASTILLONV2'">CASTILLONV2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                            900: '#172554'
                        }
                    },
                    boxShadow: {
                        soft: '0 20px 60px rgba(15, 23, 42, 0.08)'
                    }
                }
            }
        }
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
<div th:fragment="alerts">
    <div class="space-y-3 mb-6">
        <div th:if="${success}"
             class="app-alert flex items-start gap-3 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-4 text-emerald-800 shadow-sm">
            <i class="fa-solid fa-circle-check mt-0.5 text-emerald-600"></i>
            <div>
                <p class="font-semibold">Operación correcta</p>
                <p class="text-sm" th:text="${success}">Registro guardado correctamente.</p>
            </div>
        </div>

        <div th:if="${error}"
             class="app-alert flex items-start gap-3 rounded-2xl border border-red-200 bg-red-50 px-5 py-4 text-red-800 shadow-sm">
            <i class="fa-solid fa-triangle-exclamation mt-0.5 text-red-600"></i>
            <div>
                <p class="font-semibold">Ocurrió un problema</p>
                <p class="text-sm" th:text="${error}">No se pudo completar la operación.</p>
            </div>
        </div>

        <div th:if="${warning}"
             class="app-alert flex items-start gap-3 rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 text-amber-800 shadow-sm">
            <i class="fa-solid fa-circle-exclamation mt-0.5 text-amber-600"></i>
            <div>
                <p class="font-semibold">Aviso</p>
                <p class="text-sm" th:text="${warning}">Revisa la información.</p>
            </div>
        </div>
    </div>
</div>

<div th:fragment="emptyState(icon, title, message)">
    <div class="rounded-3xl border border-dashed border-slate-300 bg-white p-10 text-center shadow-sm">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-slate-100 text-slate-500">
            <i th:class="${icon} + ' text-2xl'"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-900" th:text="${title}">Sin resultados</h3>
        <p class="mt-2 text-sm text-slate-500" th:text="${message}">No se encontraron datos para mostrar.</p>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
