<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar"
     class="fixed left-0 right-0 top-0 z-40 border-b border-slate-200 bg-white/90 backdrop-blur-xl">
    <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
            <button id="sidebarOpenBtn"
                    type="button"
                    class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-50 lg:hidden">
                <i class="fa-solid fa-bars"></i>
            </button>

            <a th:href="@{/dashboard}" class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-md">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <div class="hidden sm:block">
                    <p class="text-sm font-extrabold leading-tight text-slate-900">CASTILLONV2</p>
                    <p class="text-xs font-medium text-slate-500">Sistema MVC Spring Boot</p>
                </div>
            </a>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2 text-right sm:block">
                <p class="text-sm font-bold text-slate-900"
                   sec:authentication="principal.nombreCompleto">Usuario</p>
                <p class="text-xs font-semibold uppercase tracking-wide text-blue-600"
                   sec:authentication="principal.nomUsuario">ROL</p>
            </div>

            <div class="relative">
                <button id="userMenuButton"
                        data-dropdown-toggle="userMenuDropdown"
                        type="button"
                        class="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-900 text-white shadow-md transition hover:bg-slate-800">
                    <i class="fa-solid fa-user"></i>
                </button>

                <div id="userMenuDropdown"
                     class="z-50 hidden w-64 divide-y divide-slate-100 rounded-2xl border border-slate-200 bg-white shadow-soft">
                    <div class="px-5 py-4">
                        <p class="text-sm font-bold text-slate-900"
                           sec:authentication="principal.nombreCompleto">Usuario</p>
                        <p class="text-xs text-slate-500"
                           sec:authentication="principal.username">usuario</p>
                    </div>

                    <div class="py-2">
                        <a th:href="@{/dashboard}"
                           class="flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
                            <i class="fa-solid fa-chart-line w-4 text-blue-600"></i>
                            Dashboard
                        </a>
                    </div>

                    <div class="py-2">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit"
                                    class="flex w-full items-center gap-3 px-5 py-2.5 text-left text-sm font-semibold text-red-600 hover:bg-red-50">
                                <i class="fa-solid fa-right-from-bracket w-4"></i>
                                Cerrar sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
