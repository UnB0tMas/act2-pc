<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Pedidos')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <p class="text-sm font-bold uppercase tracking-wider text-blue-600">
                <i class="fa-solid fa-receipt mr-2"></i>
                Consulta
            </p>
            <h1 class="mt-2 text-3xl font-extrabold text-slate-900">Pedidos</h1>
            <p class="mt-2 text-slate-500">Consulta pedidos, mesas y productos registrados.</p>
        </div>

        <section class="panel mb-6">
            <form th:action="@{/pedidos}" method="get" class="grid gap-4 lg:grid-cols-5">
                <div>
                    <label class="form-label"><i class="fa-solid fa-calendar"></i>Desde</label>
                    <input type="date" name="desde" th:value="${desde}" class="form-input">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-calendar"></i>Hasta</label>
                    <input type="date" name="hasta" th:value="${hasta}" class="form-input">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-toggle-on"></i>Estado</label>
                    <select name="estado" class="form-input">
                        <option value="">Todos</option>
                        <option value="1" th:selected="${estado == '1'}">Activo</option>
                        <option value="0" th:selected="${estado == '0'}">Inactivo</option>
                        <option value="P" th:selected="${estado == 'P'}">Pendiente</option>
                    </select>
                </div>

                <div class="lg:col-span-2 flex items-end gap-2">
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-filter"></i>
                        Filtrar
                    </button>
                    <a th:href="@{/pedidos}" class="btn-light">
                        <i class="fa-solid fa-rotate-left"></i>
                        Limpiar
                    </a>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="mb-5">
                <h2 class="panel-title">Listado de pedidos</h2>
                <p class="text-sm text-slate-500">
                    Total:
                    <span class="font-bold text-slate-900" th:text="${pageResult.totalElements}">0</span>
                </p>
            </div>

            <div th:if="${pageResult.empty}"
                 th:replace="~{layout/base :: emptyState('fa-solid fa-receipt', 'Sin pedidos', 'No se encontraron pedidos con los filtros aplicados.')}"></div>

            <div th:if="${pageResult.hasContent()}" class="overflow-x-auto">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Mesa</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pedido : ${pageResult.content}">
                        <td class="font-bold" th:text="${pedido.idPedido}">1</td>
                        <td th:text="${pedido.fecha != null ? #temporals.format(pedido.fecha, 'dd/MM/yyyy') : '-'}">-</td>
                        <td th:text="${pedido.mesaDescripcion ?: '-'}">Mesa</td>
                        <td th:text="${pedido.totalItems ?: 0}">0</td>
                        <td class="font-bold" th:text="${'S/ ' + #numbers.formatDecimal(pedido.total ?: 0, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</td>
                        <td>
                            <span class="status-pill" th:text="${T(com.upsjb.act2.util.EstadoUtil).etiqueta(pedido.estado)}">Activo</span>
                        </td>
                        <td>
                            <div class="flex justify-end">
                                <a th:href="@{/pedidos/{id}(id=${pedido.idPedido})}" class="icon-btn">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:replace="~{layout/pagination :: pagination(${pageResult})}"></div>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
