spring.application.name=ACT-2

# ============================================================
# SERVIDOR WEB
# ============================================================
server.port=8081

# ============================================================
# SQL SERVER - CASTILLONV2
# En SSMS el servidor se escribe como: 26.13.98.79,8080
# En JDBC se escribe como: 26.13.98.79:8080
# ============================================================
spring.datasource.url=jdbc:sqlserver://26.13.98.79:8080;databaseName=CASTILLONV2;encrypt=true;trustServerCertificate=true;loginTimeout=30;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#spring.datasource.url=jdbc:sqlserver://SQL1003.site4now.net:1433;databaseName=db_aca11e_ms2;encrypt=true;trustServerCertificate=true;loginTimeout=30;
#spring.datasource.username=db_aca11e_ms2_admin
#spring.datasource.password=franquito01
#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
#franquito01
# ============================================================
# POOL DE CONEXIONES HIKARI
# ============================================================
spring.datasource.hikari.pool-name=CASTILLONV2-HIKARI
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# ============================================================
# JDBC
# ============================================================
spring.jdbc.template.query-timeout=30

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# ============================================================
# SPRING MVC
# ============================================================
spring.mvc.format.date=yyyy-MM-dd
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ============================================================
# SESION
# ============================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.upsjb.act2=DEBUG
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.springframework.security=INFO

# ============================================================
# ERRORES
# ============================================================
server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false