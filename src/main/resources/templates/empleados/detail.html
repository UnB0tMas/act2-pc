<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Detalle empleado')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8 flex flex-col justify-between gap-4 lg:flex-row lg:items-end">
            <div>
                <a th:href="@{/empleados}" class="mb-4 inline-flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                    <i class="fa-solid fa-arrow-left"></i>
                    Volver
                </a>
                <h1 class="text-3xl font-extrabold text-slate-900" th:text="${empleado.nombreCompleto}">Empleado</h1>
                <p class="mt-2 text-slate-500" th:text="${empleado.nomCargo ?: 'Sin cargo'}">Cargo</p>
            </div>

            <a th:href="@{/empleados/{id}/editar(id=${empleado.idEmpleado})}" class="btn-primary">
                <i class="fa-solid fa-pen-to-square"></i>
                Editar
            </a>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <section class="grid gap-6 lg:grid-cols-3">
            <div class="panel lg:col-span-2">
                <h2 class="panel-title mb-6">
                    <i class="fa-solid fa-user-tie mr-2 text-blue-600"></i>
                    Información laboral
                </h2>

                <dl class="grid gap-5 md:grid-cols-2">
                    <div class="info-box"><dt>ID Empleado</dt><dd th:text="${empleado.idEmpleado}">1</dd></div>
                    <div class="info-box"><dt>DNI</dt><dd th:text="${empleado.dni ?: '-'}">-</dd></div>
                    <div class="info-box"><dt>Cargo</dt><dd th:text="${empleado.nomCargo ?: '-'}">-</dd></div>
                    <div class="info-box"><dt>Contrato</dt><dd th:text="${empleado.nomContrato ?: '-'}">-</dd></div>
                    <div class="info-box"><dt>Salario</dt><dd th:text="${'S/ ' + #numbers.formatDecimal(empleado.salario ?: 0, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</dd></div>
                    <div class="info-box"><dt>Turno</dt><dd th:text="${empleado.turno ?: '-'}">-</dd></div>
                </dl>
            </div>

            <div class="panel">
                <h2 class="panel-title mb-4">
                    <i class="fa-solid fa-circle-info mr-2 text-blue-600"></i>
                    Estado
                </h2>
                <span class="status-pill text-base" th:text="${T(com.upsjb.act2.util.EstadoUtil).etiqueta(empleado.estado)}">Activo</span>

                <form th:action="@{/empleados/{id}/estado(id=${empleado.idEmpleado})}" method="post" class="mt-6">
                    <input type="hidden" name="estado"
                           th:value="${T(com.upsjb.act2.util.EstadoUtil).esActivo(empleado.estado) ? '0' : '1'}">
                    <button type="submit" class="btn-light w-full justify-center js-confirm"
                            th:attr="data-confirm=${T(com.upsjb.act2.util.EstadoUtil).esActivo(empleado.estado) ? '¿Inactivar empleado?' : '¿Activar empleado?'}">
                        <i class="fa-solid fa-power-off"></i>
                        Cambiar estado
                    </button>
                </form>
            </div>
        </section>

        <section class="panel mt-6">
            <h2 class="panel-title mb-6">
                <i class="fa-solid fa-address-card mr-2 text-blue-600"></i>
                Datos personales
            </h2>

            <dl class="grid gap-5 md:grid-cols-3">
                <div class="info-box"><dt>Nombres</dt><dd th:text="${persona.nombres ?: '-'}">-</dd></div>
                <div class="info-box"><dt>Apellido paterno</dt><dd th:text="${persona.apePaterno ?: '-'}">-</dd></div>
                <div class="info-box"><dt>Apellido materno</dt><dd th:text="${persona.apeMaterno ?: '-'}">-</dd></div>
                <div class="info-box"><dt>Celular</dt><dd th:text="${persona.celular ?: '-'}">-</dd></div>
                <div class="info-box"><dt>Correo</dt><dd th:text="${persona.correo ?: '-'}">-</dd></div>
                <div class="info-box"><dt>Fecha nacimiento</dt><dd th:text="${persona.fecNac != null ? #temporals.format(persona.fecNac, 'dd/MM/yyyy') : '-'}">-</dd></div>
                <div class="info-box md:col-span-3"><dt>Dirección</dt><dd th:text="${persona.direccion ?: '-'}">-</dd></div>
            </dl>
        </section>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
