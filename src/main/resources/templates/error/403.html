<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Acceso denegado')}"></head>
<body class="min-h-screen bg-slate-100 font-inter">
<main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="max-w-xl rounded-[2rem] border border-slate-200 bg-white p-10 text-center shadow-soft">
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-3xl bg-red-100 text-red-600">
            <i class="fa-solid fa-shield-halved text-3xl"></i>
        </div>

        <p class="text-sm font-extrabold uppercase tracking-widest text-red-600">Error 403</p>
        <h1 class="mt-3 text-3xl font-extrabold text-slate-900">Acceso denegado</h1>
        <p class="mt-4 text-slate-500">
            No tienes permisos para acceder a este recurso o la sesión no es válida.
        </p>

        <div class="mt-8 flex justify-center gap-3">
            <a th:href="@{/dashboard}" class="btn-primary">
                <i class="fa-solid fa-gauge-high"></i>
                Ir al dashboard
            </a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-light">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Salir
                </button>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
