<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Nuevo cliente persona')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a th:href="@{/clientes}" class="mb-4 inline-flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a clientes
            </a>
            <h1 class="text-3xl font-extrabold text-slate-900">Nuevo cliente persona</h1>
            <p class="mt-2 text-slate-500">Registra los datos personales del cliente.</p>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <form th:object="${persona}" th:action="@{/clientes/persona}" method="post" class="panel space-y-6">
            <input type="hidden" name="estado" value="1">

            <div class="grid gap-5 md:grid-cols-3">
                <div>
                    <label class="form-label"><i class="fa-solid fa-id-card"></i>DNI</label>
                    <input type="text" th:field="*{dni}" class="form-input" maxlength="8" required placeholder="12345678">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-user"></i>Nombres</label>
                    <input type="text" th:field="*{nombres}" class="form-input" maxlength="80" required placeholder="Nombres">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-user"></i>Apellido paterno</label>
                    <input type="text" th:field="*{apePaterno}" class="form-input" maxlength="70" placeholder="Apellido paterno">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-user"></i>Apellido materno</label>
                    <input type="text" th:field="*{apeMaterno}" class="form-input" maxlength="70" placeholder="Apellido materno">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-phone"></i>Celular</label>
                    <input type="text" th:field="*{celular}" class="form-input" maxlength="9" placeholder="999999999">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-envelope"></i>Correo</label>
                    <input type="email" th:field="*{correo}" class="form-input" maxlength="80" placeholder="correo@dominio.com">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-calendar-days"></i>Fecha nacimiento</label>
                    <input type="date" th:field="*{fecNac}" class="form-input">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-heart"></i>Estado civil</label>
                    <select th:field="*{estCivil}" class="form-input">
                        <option value="">Seleccione</option>
                        <option value="SO">Soltero(a)</option>
                        <option value="CA">Casado(a)</option>
                        <option value="VI">Viudo(a)</option>
                        <option value="DI">Divorciado(a)</option>
                    </select>
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-map-location-dot"></i>Distrito</label>
                    <select th:field="*{idDistrito}" class="form-input">
                        <option value="">Seleccione distrito</option>
                        <option th:each="distrito : ${distritos}"
                                th:value="${distrito.idDistrito}"
                                th:text="${distrito.nombreCompleto}">
                            Departamento / Provincia / Distrito
                        </option>
                    </select>
                </div>
            </div>

            <div>
                <label class="form-label"><i class="fa-solid fa-location-dot"></i>Dirección</label>
                <input type="text" th:field="*{direccion}" class="form-input" maxlength="90" placeholder="Dirección">
            </div>

            <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-6 sm:flex-row sm:justify-end">
                <a th:href="@{/clientes}" class="btn-light justify-center">
                    <i class="fa-solid fa-xmark"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn-primary justify-center">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Guardar cliente
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
