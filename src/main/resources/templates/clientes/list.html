<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Clientes')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8 flex flex-col justify-between gap-4 lg:flex-row lg:items-end">
            <div>
                <p class="text-sm font-bold uppercase tracking-wider text-blue-600">
                    <i class="fa-solid fa-users mr-2"></i>
                    Gestión comercial
                </p>
                <h1 class="mt-2 text-3xl font-extrabold text-slate-900">Clientes</h1>
                <p class="mt-2 text-slate-500">Administra clientes persona y empresa.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/clientes/nuevo/persona}" class="btn-primary">
                    <i class="fa-solid fa-user-plus"></i>
                    Persona
                </a>
                <a th:href="@{/clientes/nuevo/empresa}" class="btn-dark">
                    <i class="fa-solid fa-building"></i>
                    Empresa
                </a>
            </div>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <section class="panel mb-6">
            <form th:action="@{/clientes}" method="get" class="grid gap-4 lg:grid-cols-5">
                <div class="lg:col-span-2">
                    <label class="form-label">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Buscar
                    </label>
                    <input type="text" name="texto" th:value="${texto}" class="form-input"
                           placeholder="DNI, RUC, nombre, correo o razón social">
                </div>

                <div>
                    <label class="form-label">
                        <i class="fa-solid fa-id-card"></i>
                        Tipo
                    </label>
                    <select name="tipo" class="form-input">
                        <option value="">Todos</option>
                        <option value="PERSONA" th:selected="${tipo == 'PERSONA'}">Persona</option>
                        <option value="EMPRESA" th:selected="${tipo == 'EMPRESA'}">Empresa</option>
                    </select>
                </div>

                <div>
                    <label class="form-label">
                        <i class="fa-solid fa-toggle-on"></i>
                        Estado
                    </label>
                    <select name="estado" class="form-input">
                        <option value="">Todos</option>
                        <option value="1" th:selected="${estado == '1'}">Activo</option>
                        <option value="0" th:selected="${estado == '0'}">Inactivo</option>
                    </select>
                </div>

                <div class="flex items-end gap-2">
                    <button type="submit" class="btn-primary w-full">
                        <i class="fa-solid fa-filter"></i>
                        Filtrar
                    </button>
                    <a th:href="@{/clientes}" class="btn-light">
                        <i class="fa-solid fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="mb-5 flex items-center justify-between">
                <div>
                    <h2 class="panel-title">Listado de clientes</h2>
                    <p class="text-sm text-slate-500">
                        Total:
                        <span class="font-bold text-slate-900" th:text="${pageResult.totalElements}">0</span>
                    </p>
                </div>
            </div>

            <div th:if="${pageResult.empty}"
                 th:replace="~{layout/base :: emptyState('fa-solid fa-users', 'Sin clientes', 'No se encontraron clientes con los filtros aplicados.')}"></div>

            <div th:if="${pageResult.hasContent()}" class="overflow-x-auto">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Documento</th>
                        <th>Cliente</th>
                        <th>Contacto</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${pageResult.content}">
                        <td class="font-bold" th:text="${cliente.idCliente}">1</td>
                        <td>
                            <span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-700"
                                  th:text="${cliente.tipoCliente}">PERSONA</span>
                        </td>
                        <td class="font-semibold" th:text="${cliente.documento ?: 'Sin documento'}">00000000</td>
                        <td>
                            <p class="font-bold text-slate-900" th:text="${cliente.displayName ?: 'Sin nombre'}">Cliente</p>
                            <p class="text-xs text-slate-500" th:text="${cliente.tipoCliente == 'EMPRESA' ? 'Razón social' : 'Persona natural'}">Tipo</p>
                        </td>
                        <td>
                            <p class="text-sm" th:text="${cliente.correo ?: cliente.telefonoEmpresa ?: 'Sin contacto'}">correo</p>
                            <p class="text-xs text-slate-500" th:text="${cliente.celular ?: ''}">celular</p>
                        </td>
                        <td>
                            <span class="status-pill"
                                  th:text="${T(com.upsjb.act2.util.EstadoUtil).etiqueta(cliente.estado)}">Activo</span>
                        </td>
                        <td>
                            <div class="flex justify-end gap-2">
                                <a th:href="@{/clientes/{id}(id=${cliente.idCliente})}" class="icon-btn">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                                <form th:action="@{/clientes/{id}/estado(id=${cliente.idCliente})}" method="post">
                                    <input type="hidden" name="estado"
                                           th:value="${T(com.upsjb.act2.util.EstadoUtil).esActivo(cliente.estado) ? '0' : '1'}">
                                    <button type="submit" class="icon-btn js-confirm"
                                            th:attr="data-confirm=${T(com.upsjb.act2.util.EstadoUtil).esActivo(cliente.estado) ? '¿Inactivar cliente?' : '¿Activar cliente?'}">
                                        <i class="fa-solid fa-power-off"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:replace="~{layout/pagination :: pagination(${pageResult})}"></div>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
