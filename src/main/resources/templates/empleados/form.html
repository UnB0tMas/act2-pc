<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${empleado.idEmpleado == null ? 'Nuevo empleado' : 'Editar empleado'})}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a th:href="@{/empleados}" class="mb-4 inline-flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a empleados
            </a>
            <h1 class="text-3xl font-extrabold text-slate-900"
                th:text="${empleado.idEmpleado == null ? 'Nuevo empleado' : 'Editar empleado'}">Empleado</h1>
            <p class="mt-2 text-slate-500">Registra datos personales y laborales del empleado.</p>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <form th:action="${empleado.idEmpleado == null} ? @{/empleados} : @{/empleados/{id}(id=${empleado.idEmpleado})}"
              method="post"
              class="space-y-6">
            <input type="hidden" name="idEmpleado" th:value="${empleado.idEmpleado}">
            <input type="hidden" name="idPersona" th:value="${persona.idPersona}">

            <section class="panel">
                <h2 class="panel-title mb-6">
                    <i class="fa-solid fa-user mr-2 text-blue-600"></i>
                    Datos personales
                </h2>

                <div class="grid gap-5 md:grid-cols-3">
                    <div>
                        <label class="form-label"><i class="fa-solid fa-id-card"></i>DNI</label>
                        <input type="text" name="dni" th:value="${persona.dni}" class="form-input" maxlength="8" required>
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-user"></i>Nombres</label>
                        <input type="text" name="nombres" th:value="${persona.nombres}" class="form-input" maxlength="80" required>
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-user"></i>Apellido paterno</label>
                        <input type="text" name="apePaterno" th:value="${persona.apePaterno}" class="form-input" maxlength="70">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-user"></i>Apellido materno</label>
                        <input type="text" name="apeMaterno" th:value="${persona.apeMaterno}" class="form-input" maxlength="70">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-phone"></i>Celular</label>
                        <input type="text" name="celular" th:value="${persona.celular}" class="form-input" maxlength="9">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-envelope"></i>Correo</label>
                        <input type="email" name="correo" th:value="${persona.correo}" class="form-input" maxlength="80">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-calendar-days"></i>Fecha nacimiento</label>
                        <input type="date" name="fecNac" th:value="${persona.fecNac}" class="form-input">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-heart"></i>Estado civil</label>
                        <select name="estCivil" class="form-input">
                            <option value="">Seleccione</option>
                            <option value="SO" th:selected="${persona.estCivil == 'SO'}">Soltero(a)</option>
                            <option value="CA" th:selected="${persona.estCivil == 'CA'}">Casado(a)</option>
                            <option value="VI" th:selected="${persona.estCivil == 'VI'}">Viudo(a)</option>
                            <option value="DI" th:selected="${persona.estCivil == 'DI'}">Divorciado(a)</option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-map-location-dot"></i>Distrito</label>
                        <select name="idDistrito" class="form-input">
                            <option value="">Seleccione distrito</option>
                            <option th:each="distrito : ${distritos}"
                                    th:value="${distrito.idDistrito}"
                                    th:text="${distrito.nombreCompleto}"
                                    th:selected="${persona.idDistrito != null and persona.idDistrito == distrito.idDistrito}">
                                Distrito
                            </option>
                        </select>
                    </div>

                    <div class="md:col-span-3">
                        <label class="form-label"><i class="fa-solid fa-location-dot"></i>Dirección</label>
                        <input type="text" name="direccion" th:value="${persona.direccion}" class="form-input" maxlength="90">
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2 class="panel-title mb-6">
                    <i class="fa-solid fa-briefcase mr-2 text-blue-600"></i>
                    Datos laborales
                </h2>

                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label class="form-label"><i class="fa-solid fa-briefcase"></i>Cargo</label>
                        <select name="idCargo" class="form-input" required>
                            <option value="">Seleccione cargo</option>
                            <option th:each="cargo : ${cargos}"
                                    th:value="${cargo.idCargo}"
                                    th:text="${cargo.nomCargo}"
                                    th:selected="${empleado.idCargo != null and empleado.idCargo == cargo.idCargo}">
                                Cargo
                            </option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-file-contract"></i>Contrato</label>
                        <select name="idContrato" class="form-input" required>
                            <option value="">Seleccione contrato</option>
                            <option th:each="contrato : ${contratos}"
                                    th:value="${contrato.idContrato}"
                                    th:text="${contrato.nomContrato}"
                                    th:selected="${empleado.idContrato != null and empleado.idContrato == contrato.idContrato}">
                                Contrato
                            </option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-sack-dollar"></i>Salario</label>
                        <input type="number" name="salario" th:value="${empleado.salario}" class="form-input" min="0" step="0.01">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-clock"></i>Turno</label>
                        <input type="text" name="turno" th:value="${empleado.turno}" class="form-input" maxlength="90" placeholder="Mañana, tarde, noche">
                    </div>

                    <div>
                        <label class="form-label"><i class="fa-solid fa-toggle-on"></i>Estado</label>
                        <select name="estado" class="form-input">
                            <option value="1" th:selected="${empleado.estado == null or T(com.upsjb.act2.util.EstadoUtil).esActivo(empleado.estado)}">Activo</option>
                            <option value="0" th:selected="${T(com.upsjb.act2.util.EstadoUtil).esInactivo(empleado.estado)}">Inactivo</option>
                        </select>
                    </div>
                </div>
            </section>

            <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
                <a th:href="@{/empleados}" class="btn-light justify-center">
                    <i class="fa-solid fa-xmark"></i>
                    Cancelar
                </a>
                <button type="submit" class="btn-primary justify-center">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Guardar empleado
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
