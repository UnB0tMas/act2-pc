<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Ventas')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <p class="text-sm font-bold uppercase tracking-wider text-blue-600">
                <i class="fa-solid fa-cash-register mr-2"></i>
                Consulta
            </p>
            <h1 class="mt-2 text-3xl font-extrabold text-slate-900">Ventas</h1>
            <p class="mt-2 text-slate-500">Consulta ventas registradas y su detalle de pedido.</p>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <section class="panel mb-6">
            <form th:action="@{/ventas}" method="get" class="grid gap-4 lg:grid-cols-6">
                <div>
                    <label class="form-label"><i class="fa-solid fa-calendar"></i>Desde</label>
                    <input type="date" name="desde" th:value="${desde}" class="form-input">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-calendar"></i>Hasta</label>
                    <input type="date" name="hasta" th:value="${hasta}" class="form-input">
                </div>

                <div class="lg:col-span-2">
                    <label class="form-label"><i class="fa-solid fa-credit-card"></i>Método pago</label>
                    <select name="idMetodoPago" class="form-input">
                        <option value="">Todos</option>
                        <option th:each="mp : ${metodosPago}"
                                th:value="${mp.idMetodoPago}"
                                th:text="${mp.nomMetodo}"
                                th:selected="${idMetodoPago != null and idMetodoPago == mp.idMetodoPago}">
                            Método
                        </option>
                    </select>
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-toggle-on"></i>Estado</label>
                    <select name="estado" class="form-input">
                        <option value="">Todos</option>
                        <option value="1" th:selected="${estado == '1'}">Activo</option>
                        <option value="0" th:selected="${estado == '0'}">Inactivo</option>
                        <option value="N" th:selected="${estado == 'N'}">Anulado</option>
                    </select>
                </div>

                <div class="flex items-end gap-2">
                    <button type="submit" class="btn-primary w-full">
                        <i class="fa-solid fa-filter"></i>
                        Filtrar
                    </button>
                    <a th:href="@{/ventas}" class="btn-light">
                        <i class="fa-solid fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="mb-5">
                <h2 class="panel-title">Listado de ventas</h2>
                <p class="text-sm text-slate-500">
                    Total:
                    <span class="font-bold text-slate-900" th:text="${pageResult.totalElements}">0</span>
                </p>
            </div>

            <div th:if="${pageResult.empty}"
                 th:replace="~{layout/base :: emptyState('fa-solid fa-cash-register', 'Sin ventas', 'No se encontraron ventas con los filtros aplicados.')}"></div>

            <div th:if="${pageResult.hasContent()}" class="overflow-x-auto">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Método</th>
                        <th>Documento</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="venta : ${pageResult.content}">
                        <td class="font-bold" th:text="${venta.idVentas}">1</td>
                        <td th:text="${venta.fechaVenta != null ? #temporals.format(venta.fechaVenta, 'dd/MM/yyyy') : '-'}">-</td>
                        <td>
                            <p class="font-bold text-slate-900" th:text="${venta.clienteNombre ?: 'Cliente no definido'}">Cliente</p>
                            <p class="text-xs text-slate-500" th:text="${venta.clienteDocumento ?: '-'}">Documento</p>
                        </td>
                        <td th:text="${venta.metodoPago ?: '-'}">Método</td>
                        <td th:text="${venta.documento ?: '-'}">B</td>
                        <td class="font-bold" th:text="${'S/ ' + #numbers.formatDecimal(venta.totalPagar ?: 0, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</td>
                        <td>
                            <span class="status-pill" th:text="${T(com.upsjb.act2.util.EstadoUtil).etiqueta(venta.estado)}">Activo</span>
                        </td>
                        <td>
                            <div class="flex justify-end">
                                <a th:href="@{/ventas/{id}(id=${venta.idVentas})}" class="icon-btn">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:replace="~{layout/pagination :: pagination(${pageResult})}"></div>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
