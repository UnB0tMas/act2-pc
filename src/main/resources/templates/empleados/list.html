<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Empleados')}"></head>
<body class="bg-slate-100 font-inter text-slate-800">
<div th:replace="~{layout/navbar :: navbar}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="min-h-screen pt-16 lg:pl-72">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8 flex flex-col justify-between gap-4 lg:flex-row lg:items-end">
            <div>
                <p class="text-sm font-bold uppercase tracking-wider text-blue-600">
                    <i class="fa-solid fa-user-tie mr-2"></i>
                    Recursos humanos
                </p>
                <h1 class="mt-2 text-3xl font-extrabold text-slate-900">Empleados</h1>
                <p class="mt-2 text-slate-500">Administra empleados, cargo, contrato y datos personales.</p>
            </div>

            <a th:href="@{/empleados/nuevo}" class="btn-primary">
                <i class="fa-solid fa-user-plus"></i>
                Nuevo empleado
            </a>
        </div>

        <div th:replace="~{layout/base :: alerts}"></div>

        <section class="panel mb-6">
            <form th:action="@{/empleados}" method="get" class="grid gap-4 lg:grid-cols-6">
                <div class="lg:col-span-2">
                    <label class="form-label"><i class="fa-solid fa-magnifying-glass"></i>Buscar</label>
                    <input type="text" name="texto" th:value="${texto}" class="form-input"
                           placeholder="DNI, nombres, correo">
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-briefcase"></i>Cargo</label>
                    <select name="idCargo" class="form-input">
                        <option value="">Todos</option>
                        <option th:each="cargo : ${cargos}"
                                th:value="${cargo.idCargo}"
                                th:text="${cargo.nomCargo}"
                                th:selected="${idCargo != null and idCargo == cargo.idCargo}">Cargo</option>
                    </select>
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-file-contract"></i>Contrato</label>
                    <select name="idContrato" class="form-input">
                        <option value="">Todos</option>
                        <option th:each="contrato : ${contratos}"
                                th:value="${contrato.idContrato}"
                                th:text="${contrato.nomContrato}"
                                th:selected="${idContrato != null and idContrato == contrato.idContrato}">Contrato</option>
                    </select>
                </div>

                <div>
                    <label class="form-label"><i class="fa-solid fa-toggle-on"></i>Estado</label>
                    <select name="estado" class="form-input">
                        <option value="">Todos</option>
                        <option value="1" th:selected="${estado == '1'}">Activo</option>
                        <option value="0" th:selected="${estado == '0'}">Inactivo</option>
                    </select>
                </div>

                <div class="flex items-end gap-2">
                    <button type="submit" class="btn-primary w-full">
                        <i class="fa-solid fa-filter"></i>
                        Filtrar
                    </button>
                    <a th:href="@{/empleados}" class="btn-light">
                        <i class="fa-solid fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="mb-5">
                <h2 class="panel-title">Listado de empleados</h2>
                <p class="text-sm text-slate-500">
                    Total:
                    <span class="font-bold text-slate-900" th:text="${pageResult.totalElements}">0</span>
                </p>
            </div>

            <div th:if="${pageResult.empty}"
                 th:replace="~{layout/base :: emptyState('fa-solid fa-user-tie', 'Sin empleados', 'No se encontraron empleados con los filtros aplicados.')}"></div>

            <div th:if="${pageResult.hasContent()}" class="overflow-x-auto">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Empleado</th>
                        <th>Cargo</th>
                        <th>Contrato</th>
                        <th>Salario</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="empleado : ${pageResult.content}">
                        <td class="font-bold" th:text="${empleado.idEmpleado}">1</td>
                        <td th:text="${empleado.dni ?: '-'}">DNI</td>
                        <td>
                            <p class="font-bold text-slate-900" th:text="${empleado.nombreCompleto ?: 'Sin nombre'}">Empleado</p>
                            <p class="text-xs text-slate-500" th:text="${empleado.correo ?: empleado.celular ?: 'Sin contacto'}">Contacto</p>
                        </td>
                        <td th:text="${empleado.nomCargo ?: '-'}">Cargo</td>
                        <td th:text="${empleado.nomContrato ?: '-'}">Contrato</td>
                        <td class="font-bold" th:text="${'S/ ' + #numbers.formatDecimal(empleado.salario ?: 0, 1, 'COMMA', 2, 'POINT')}">S/ 0.00</td>
                        <td>
                            <span class="status-pill" th:text="${T(com.upsjb.act2.util.EstadoUtil).etiqueta(empleado.estado)}">Activo</span>
                        </td>
                        <td>
                            <div class="flex justify-end gap-2">
                                <a th:href="@{/empleados/{id}(id=${empleado.idEmpleado})}" class="icon-btn">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                                <a th:href="@{/empleados/{id}/editar(id=${empleado.idEmpleado})}" class="icon-btn">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <form th:action="@{/empleados/{id}/estado(id=${empleado.idEmpleado})}" method="post">
                                    <input type="hidden" name="estado"
                                           th:value="${T(com.upsjb.act2.util.EstadoUtil).esActivo(empleado.estado) ? '0' : '1'}">
                                    <button type="submit" class="icon-btn js-confirm"
                                            th:attr="data-confirm=${T(com.upsjb.act2.util.EstadoUtil).esActivo(empleado.estado) ? '¿Inactivar empleado?' : '¿Activar empleado?'}">
                                        <i class="fa-solid fa-power-off"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:replace="~{layout/pagination :: pagination(${pageResult})}"></div>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
